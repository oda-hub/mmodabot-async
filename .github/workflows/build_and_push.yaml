name: Build and Push Docker Images
on:
  pull_request:
    types: [labeled, synchronize]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  detect-changes:
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'build-docker') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'push'

      - name: Detect changes in packages
        uses: dorny/paths-filter@v4
        id: filter
        
        with:
          predicate-quantifier: 'every'
          filters: |
            drupal-module-controller:
              - 'packages/drupal-module-controller/**'
              - '!packages/drupal-module-controller/tests/**'

            mmodabot:
              - 'packages/mmodabot/**'
              - '!packages/mmodabot/tests/**'

            mmoda-kg-registrar:
              - 'packages/mmoda-kg-registrar/**'
              - '!packages/mmoda-kg-registrar/tests/**'

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Parse JSON array containing names of all filters matching any of changed files
        # e.g. ['package1', 'package2'] if both package folders contains changes
        package: ${{ fromJSON(needs.detect-changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.package }}
          tags: |
            type=raw,value={{sha}}-main-{{date 'YYMMDDHHmmss'}},enable=${{github.event_name != 'pull_request'}}
            type=raw,value={{sha}}-${{ github.head_ref }}-{{date 'YYMMDDHHmmss'}},enable=${{github.event_name == 'pull_request'}}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: packages/${{ matrix.package }}
          file: packages/${{ matrix.package }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max




