name: Lint and Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
    lint:
        name: Lint with Ruff
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.13"]
                package: ["mmodabot", "mmoda-kg-registrar", "drupal-module-controller"]
        steps:
            - uses: actions/checkout@v6
            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                version: "0.11.6"
                python-version: ${{ matrix.python-version }}
            - name: Install the project
              run: uv sync --locked --all-extras --dev --project packages/${{ matrix.package }}
            - name: Run ruff
              run: uv run ruff check packages/${{ matrix.package }} 
              continue-on-error: true
    test:
        name: Test with pytest
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.13"]
                package: ["mmodabot", "mmoda-kg-registrar", "drupal-module-controller"]
        steps:
            - uses: actions/checkout@v6
            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                version: "0.11.6"
                python-version: ${{ matrix.python-version }}
            - name: Install the project
              run: uv sync --locked --all-extras --dev --project packages/${{ matrix.package }}
            - name: Run tests
              run: uv run pytest packages/${{ matrix.package }}/tests --cov --cov-report=xml