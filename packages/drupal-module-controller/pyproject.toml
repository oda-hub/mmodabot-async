[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mmoda_drupal_module_controller"]

[tool.hatch.metadata]
allow-direct-references = true

[project]
name = "mmoda-drupal-module-controller"
version = "0.1.0"
description = "A controller for Drupal modules in MMODA, providing a REST API to manage module states and configurations."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi",
    "uvicorn",
    "mmoda-tab-generator @ git+https://github.com/oda-hub/frontend-tab-generator.git",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx",
]

[project.scripts]
"mmoda-drupal-module-controller" = "mmoda_drupal_module_controller.cli:run_api"
