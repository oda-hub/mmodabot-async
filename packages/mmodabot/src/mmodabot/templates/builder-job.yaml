apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko # placeholder
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      containers:
      - name: build
        image: ghcr.io/osscontainertools/kaniko:latest
        imagePullPolicy: Always
        args: 
          - "--dockerfile=/workspace/Dockerfile"
          - "--context=dir:///workspace"
          - "--push-retry=2"
          - "--secret=id=token,env=GIT_TOKEN,type=env"
          - "--single-snapshot" # Otherwise, snapshots may take too much ephemeral storage
          # - "--destination=namespace/imgrepo:tag"
          # - "--build-arg=REPO_URL=https://gitlab.in2p3.fr/mmoda/workflows/foobar.git"
          # - "--build-arg=GIT_REF=master"
          # - "--build-arg=NB2W_VER='=1.3.117'" # optional, none for latest pypi
        volumeMounts:
          - name: context
            subPath: Dockerfile
            mountPath: /workspace/Dockerfile
          - name: kaniko-docker-config
            subPath: .dockerconfigjson
            mountPath: /kaniko/.docker/config.json
#        env:
          # - name: GIT_TOKEN
          #   valueFrom:
          #     secretKeyRef:
          #       name: kaniko-repo-read
          #       key: token
          # OR
          # - name: GIT_TOKEN
          #   value: ""
        resources:
          requests:
            ephemeral-storage: 20G
            cpu: "0.5"
            memory: 4G
          limits:
            ephemeral-storage: 20G
            cpu: "1"
            memory: 16G

      restartPolicy: Never
      volumes:
        - name: context
          configMap:
            name: backend-builder-dockerfile
        - name: kaniko-docker-config
          secret:
            secretName: kaniko-registry-push

