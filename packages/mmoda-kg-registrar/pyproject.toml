[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mmoda_kg_registrar"]

[project]
name = "mmoda-kg-registrar"
version = "0.1.0"
description = "A Knowledge Graph registrar for MMODA backends with a simple REST API."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "rdflib>=7.6.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.23.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "httpx>=0.28.1",
]

[project.scripts]
"mmoda-kg-registrar" = "mmoda_kg_registrar.cli:run_api"

